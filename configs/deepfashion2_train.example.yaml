# Run with:
#   python3 tools/train_yolo.py --cfg configs/deepfashion2_train.example.yaml

# Path to YOLO checkpoint/config
# Examples:
#   models/YOLOv11/yolo11s.pt
#   models/YOLOv26/yolo26m.pt
model: models/YOLOv26/yolo26n.pt

# Path to prepared dataset YAML produced by run_pipeline.py
data: data/processed/deepfashion2/deepfashion2.yaml

# Training hyperparameters
epochs: 120      # DeepFashion2 often benefits from longer training
imgsz: 640
batch: 12        # tune by available VRAM

# Hardware / loader settings
device: 0
workers: 8

# Output location for training logs/checkpoints
project: runs/train
name: deepfashion2-yolo26n-demo

# Reproducibility
seed: 42

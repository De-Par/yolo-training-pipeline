# High-accuracy + high-throughput preset for NVIDIA GPUs.
# Usage:
#   yolo-train --cfg configs/train/nvidia.yaml

# ==============================================================================
# REQUIRED PATHS
# ==============================================================================

# Model weights or model definition to train.
# Typical values:
# - pretrained checkpoint: models/YOLOv26/yolo26n.pt
# - architecture yaml:     yolo11n.yaml
# Tradeoff:
# - larger models usually improve accuracy
# - smaller models train faster and need less VRAM
model: models/YOLOv26/yolo26n.pt

# Dataset YAML generated by the convert step or by the optional prepare step.
# It must define:
# - path
# - train / val
# - names
# - nc
# Example: data/converted/my_dataset/my_dataset.yaml
data: data/converted/my_dataset/my_dataset.yaml


# ==============================================================================
# RUN MANAGEMENT
# ==============================================================================

# Base directory for run artifacts.
# Ultralytics writes run folders like:
#   <project>/<name>/
# containing checkpoints, metrics, plots, args.yaml, etc.
project: runs

# Run name inside project.
# Final output directory becomes:
#   runs/yolo-run-cuda
name: yolo-run-cuda

# Behavior when the target run directory already exists.
# - false: create a new incremented directory (safe default)
# - true: reuse the same directory name
# Use true only if you deliberately want to overwrite/reuse an existing run.
exist_ok: false

# Save checkpoints during training.
# If false, training still runs but you lose normal checkpoint outputs.
save: true

# Save a checkpoint every N epochs.
# - 10 means epoch10.pt, epoch20.pt, ...
# - -1 disables periodic checkpoints and keeps only best/last
# Larger values reduce disk writes.
save_period: 10

# Save training plots such as loss and metric curves.
# Helpful for debugging training dynamics and regressions.
plots: true

# Extra trainer logging.
# - true: more console output
# - false: quieter runs
verbose: true


# ==============================================================================
# CORE SCHEDULE
# ==============================================================================

# Total number of training epochs.
# More epochs can improve accuracy if the model is still learning,
# but they increase total training time.
epochs: 300

# Early stopping patience in epochs.
# Training stops if the monitored fitness metric does not improve for this many epochs.
# Lower values stop sooner and save time.
# Higher values give the model more room to recover after plateaus.
patience: 10

# Training image size in pixels.
# Ultralytics train/val expects a single integer here, not [H, W].
# Internally each image is resized with aspect-ratio preservation and padded to imgsz x imgsz.
# Higher imgsz:
# - usually helps small objects
# - costs more VRAM and training time
imgsz: 1024

# Batch size per optimizer step.
# Larger batch:
# - improves throughput
# - uses more VRAM
# - interacts with learning-rate scaling through nbs
# If you hit CUDA OOM, reduce this first.
batch: 32


# ==============================================================================
# DEVICE / SPEED
# ==============================================================================

# Training device.
# Examples:
# - 0       -> first CUDA GPU
# - 1       -> second CUDA GPU
# - cpu     -> CPU
# On this preset we assume NVIDIA and want CUDA, so 0 is the normal value.
device: 0

# Number of DataLoader worker processes.
# More workers improve data feeding if CPU/storage keep up.
# Too many workers can hurt stability on weak CPUs or slow disks.
workers: 16

# Image caching mode.
# Options:
# - false / null: no cache
# - disk: cache metadata/images on disk
# - ram: cache images in RAM for maximum speed
# Tradeoff:
# - ram is fastest, but memory-heavy
# - disk is safer and still helps
cache: disk

# Automatic Mixed Precision.
# Uses FP16 where safe and FP32 where needed.
# On NVIDIA this usually:
# - speeds up training
# - reduces VRAM usage
# Turn off only if you hit numerical instability.
amp: true

# torch.compile support.
# Can improve speed on some CUDA setups, but startup becomes slower
# and some model / driver / PyTorch combinations are less stable.
# Keep false unless you have verified it helps on your stack.
compile: false


# ==============================================================================
# REPRODUCIBILITY
# ==============================================================================

# Global random seed for dataloading, augmentation sampling, and initialization.
# Helps reproduce runs more closely.
seed: 42

# Deterministic training mode.
# - true: more reproducible, often slower
# - false: faster, but less bit-for-bit repeatable
# For production sweeps, false is usually the pragmatic default.
deterministic: false

# Whether to initialize from pretrained weights when the model supports it.
# Usually true for best accuracy and faster convergence.
# Set false only for controlled experiments from scratch.
pretrained: true

# Run validation during training.
# Needed if you want best.pt selected by validation fitness.
val: true

# Fraction of the training set to use.
# - 1.0 means full dataset
# - 0.1 means 10 percent
# Useful for smoke tests and quick experiments.
fraction: 1.0


# ==============================================================================
# OPTIMIZER / LR
# ==============================================================================

# Optimizer choice.
# Common values:
# - auto
# - SGD
# - Adam
# - AdamW
# AdamW is a strong default for fine-grained detection and transfer learning.
optimizer: AdamW

# Initial learning rate.
# This is one of the most sensitive parameters in the config.
# Too high:
# - unstable loss
# - bad convergence
# Too low:
# - slow learning
# - underfitting
lr0: 0.002

# Final LR fraction for the schedule.
# End-of-training LR becomes:
#   lr0 * lrf
# With lr0=0.002 and lrf=0.02, final LR is 0.00004.
lrf: 0.02

# Momentum term.
# For SGD this is the standard momentum.
# For Adam/AdamW in Ultralytics this maps to beta1-like behavior.
# Higher values smooth updates more aggressively.
momentum: 0.9

# Weight decay regularization.
# Helps reduce overfitting by penalizing large weights.
# Too high can suppress learning, especially for smaller models.
weight_decay: 0.0005

# Use cosine LR decay instead of the default linear-style decay.
# Cosine often gives smoother late-stage optimization.
cos_lr: true

# Number of warmup epochs.
# Warmup gradually increases LR at the start of training to avoid unstable first updates.
warmup_epochs: 5.0

# Starting momentum during warmup.
# The trainer ramps this toward the main momentum value.
warmup_momentum: 0.8

# Separate warmup LR for bias parameters.
# Biases often benefit from a different warmup than main weights.
warmup_bias_lr: 0.05

# Nominal batch size used for internal LR scaling.
# If actual batch differs from nbs, Ultralytics scales LR accordingly.
# Keep this aligned with your tuning assumptions.
nbs: 64


# ==============================================================================
# LOSS BALANCE
# ==============================================================================

# Box regression loss gain.
# Higher values push the model harder on localization quality.
box: 8.0

# Classification loss gain.
# Raising this can help when class confusion is a bigger problem than box quality,
# especially in fine-grained clothing datasets.
cls: 0.8

# Distribution Focal Loss gain.
# Impacts the quality of box boundary regression for modern YOLO heads.
dfl: 1.8


# ==============================================================================
# DATA FILTERS
# ==============================================================================

# Train as a single-class problem regardless of dataset class IDs.
# Usually false unless you intentionally collapse all targets into one class.
single_cls: false

# Restrict training to a subset of original dataset class IDs.
# - null: use all classes
# - [23]: train only class 23
# - [0, 1, 2]: train only those classes
# This does not rewrite the dataset itself; it tells the trainer to ignore other classes.
classes: null

# Rectangular batching.
# Groups similar aspect ratios together to reduce padding waste.
# Can improve throughput, but reduces augmentation randomness and is less common for max-accuracy training.
rect: false

# Multi-scale training.
# Randomly varies train image size around imgsz during training.
# Can improve scale robustness, but usually slows training and makes optimization noisier.
multi_scale: false


# ==============================================================================
# AUGMENTATION
# ==============================================================================

# HSV augmentation strength.
# These randomly perturb image color:
# - hsv_h: hue shift
# - hsv_s: saturation gain
# - hsv_v: value/brightness gain
# Good for lighting and color variation, but too much hurts fine-grained apparel details.
hsv_h: 0.012
hsv_s: 0.65
hsv_v: 0.45

# Random rotation range in degrees.
# Small values help reduce pose/camera bias without breaking boxes too aggressively.
degrees: 3.0

# Random translation amount as a fraction of image size.
# Important against center bias.
# Example: 0.12 means the image may be shifted by about 12 percent horizontally/vertically.
translate: 0.12

# Random scale gain.
# Helps scale robustness.
# Higher values can help generalization, but can also destroy tiny objects if too aggressive.
scale: 0.7

# Shear transform strength.
# Usually left near zero for fashion/object datasets unless you explicitly want projective distortion.
shear: 0.0

# Perspective transform strength.
# Also usually kept near zero for standard product/person clothing detection.
perspective: 0.0

# Vertical flip probability.
# Normally zero for clothing/person data because upside-down samples are unrealistic.
flipud: 0.0

# Horizontal flip probability.
# Usually safe for clothing detection unless class semantics depend on left/right orientation.
fliplr: 0.5

# BGR channel swap probability.
# Rarely useful for natural-image detection; usually kept at zero.
bgr: 0.0

# Mosaic probability.
# Combines four images into one training sample.
# Strongly helps:
# - object diversity per image
# - off-center placement
# - context variation
# Can also make optimization noisier, especially late in training.
mosaic: 1.0

# Disable mosaic during the final N epochs.
# This stabilizes the end of training so the model fine-tunes on more natural-looking samples.
close_mosaic: 30

# MixUp probability.
# Blends two images and their labels.
# Can regularize training, but too much can hurt precise localization.
mixup: 0.15

# Copy-paste augmentation probability.
# More useful for segmentation-heavy setups; usually zero for plain detection unless validated experimentally.
copy_paste: 0.0

# Random erasing probability.
# Simulates occlusion by masking random image regions.
# Useful for robustness, but too much can remove critical small details.
erasing: 0.3

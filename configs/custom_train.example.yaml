# Run with:
#   python3 tools/train_yolo.py --cfg configs/custom_train.example.yaml

# Your model checkpoint/config
# Use any supported generation, e.g. yolo11n, yolo26s, etc.
model: path/to/yolo.pt

# Path to your custom YOLO data.yaml
# This file should define path/train/val/names
data: path/to/detection_dataset/data.yaml

# Training hyperparameters
epochs: 80
imgsz: 640
batch: 16

# Hardware / loader settings
device: 0        # use cpu if no GPU
workers: 4       # lower on weak CPUs or network disks

# Output location for training logs/checkpoints
project: runs/train
name: my-dataset-yolo11n-baseline

# Reproducibility
seed: 42

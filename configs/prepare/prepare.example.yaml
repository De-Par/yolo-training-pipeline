# ==================================================================================
# Optional in-place preparation recipe for a YOLO-style dataset.
# Apply it with:
#   yolo-prepare-dataset --dataset-dir data/converted/my_dataset --recipe configs/prepare/prepare.example.yaml
#
# Important:
# - Preparation mutates the dataset directory in place.
# - A recipe that does not request any real change is rejected.
# - Inspect the dataset first:
#   yolo-print-stats --dataset-dir data/converted/my_dataset
#
# Actual preparation order:
#
# Field                               Works on
# ----------------------------------  ---------------------------------------------
# classes.keep                        ORIGINAL classes
# classes.drop                        ORIGINAL classes
# classes.remap                       ORIGINAL classes -> builds NEW classes
# empty_policy                        TRANSFORMED labels / NEW dataset state
# split.mode                          NEW dataset
# split.seed                          NEW dataset
# split.train_fraction                NEW dataset
# split.val_fraction                  NEW dataset
# split.test_fraction                 NEW dataset
# split.min_val_instances_per_class   NEW classes
# split.min_test_instances_per_class  NEW classes
# split.per_class_min_val_instances   NEW classes
# split.per_class_min_test_instances  NEW classes
#
# This means:
# - combined resplit modes operate on already transformed labels
# - split instance constraints are checked on final classes, not original ones
# ==================================================================================


# ==================================================================================
# Optional dataset name for the regenerated data.yaml file.
# If omitted, the current dataset directory name is used.
# ==================================================================================
# dataset_name: my_dataset_prepared


# ==================================================================================
# Policy for images that become empty after class filtering/remapping:
# - drop: remove the image file and its label file
# - keep: keep the image and leave an empty label file
#
# Typical choice for pure object detection training: drop
# ==================================================================================
empty_policy: drop


classes:
  # ==================================================================================
  # Optional selectors of original classes to keep.
  # If omitted or empty, all original classes are considered kept.
  #
  # Supported selector forms:
  # - exact class name
  # - class id
  # - id range
  # ==================================================================================
  keep: []


  # ==================================================================================
  # Optional selectors of original classes to drop.
  #
  # Applied before remap resolution is finalized.
  # If a class is dropped, it cannot be referenced by remap rules.
  # ==================================================================================
  drop: []


  # ==================================================================================
  # Remap original classes into final classes.
  #
  # Each rule:
  # - defines a final class name in 'name'
  # - collects one or more original source classes in 'from'
  #
  # A rule with one source class works like a rename.
  # A rule with multiple source classes merges them into one final class.
  #
  # Supported selector forms in 'from':
  # - exact class name
  # - class id
  # - id range
  #
  # Validation rules:
  # - each remap rule must have a non-empty 'name'
  # - each remap rule must resolve to at least one original class
  # - the same original class cannot appear in multiple remap rules
  # - dropped classes cannot be referenced here
  #
  # Final class ids are assigned automatically in sorted original-id order
  # of the kept classes after remapping.
  # ==================================================================================
  remap: []

  # ==================================================================================
  # Examples:
  #
  # remap:
  #   - name: footwear
  #     from: [23]
  #
  #   - name: outerwear
  #     from: ["coat", "jacket"]
  #
  #   - name: tops
  #     from: ["shirt, blouse", "top, t-shirt, sweatshirt", 2, 3]
  #
  #   - name: clothing_parts
  #     from: ["30-35"]
  # ==================================================================================

  # WARNING
  # ==================================================================================
  # Recipe must request at least one real mutation.
  # Examples of valid changes:
  # - set split.mode to sample_existing or a combined resplit mode
  # - change split fractions from defaults
  # - set split instance constraints
  # - set classes.keep
  # - set classes.drop
  # - set classes.remap
  # - set dataset_name to a different output dataset name
  # ==================================================================================


split:
  # ==================================================================================
  # Split modes:
  #
  # - keep_existing
  #   Keep current train / val / (test) split boundaries as-is.
  #   Only class filtering/remapping is applied.
  #
  # - sample_existing
  #   Downsample each existing split independently.
  #   Fractions are per-split keep rates.
  #
  # - resplit_combined_random
  #   Merge all current splits into one pool and resplit randomly
  #   according to target fractions.
  #
  # - resplit_combined_by_instances
  #   Merge all current splits into one pool and resplit while trying
  #   to satisfy minimum instance targets for val/test first, then fill
  #   the remaining images to target split sizes.
  #
  # Notes:
  # - train and val must exist before preparation starts
  # - test is optional
  # ==================================================================================
  mode: keep_existing


  # ==================================================================================
  # Random seed used by:
  # - sample_existing
  # - resplit_combined_random
  # - resplit_combined_by_instances
  # ==================================================================================
  seed: 42


  # ==================================================================================
  # Fraction semantics depend on the mode.
  #
  # For sample_existing:
  # - train_fraction = keep rate inside existing train
  # - val_fraction   = keep rate inside existing val
  # - test_fraction  = keep rate inside existing test
  #
  # For combined resplit modes:
  # - fractions define target sizes in the merged image pool
  # - train_fraction + val_fraction + test_fraction must be exactly 1.0
  # - train_fraction > 0 and val_fraction > 0 are required
  #
  # For keep_existing:
  # - fractions are effectively ignored
  # ==================================================================================
  train_fraction: 1.0
  val_fraction: 1.0
  test_fraction: 0.0


  # ==================================================================================
  # Optional default minimum instance constraints for
  # resplit_combined_by_instances only.
  #
  # These request at least N object instances of every present final class
  # in the corresponding split.
  #
  # Important:
  # - these constraints are evaluated after classes.keep / classes.drop / classes.remap
  # - they refer to final class ids / names after transformation
  # - classes with zero remaining instances are ignored
  # ==================================================================================
  min_val_instances_per_class: 0
  min_test_instances_per_class: 0


  # ==================================================================================
  # Optional per-class overrides for resplit_combined_by_instances only.
  #
  # These override or strengthen the default minima above for selected final classes.
  #
  # Supported selector forms:
  # - exact class name, for example: "shirt, blouse"
  # - class id, for example: "23"
  # - id range, for example: "30-35"
  #
  # Important:
  # - selectors are resolved against FINAL classes after keep/drop/remap
  # - if you merge old classes into a new class name, use that new name here
  #
  # Example:
  # per_class_min_val_instances:
  #   tops: 150
  #   footwear: 80
  #
  # Compact flow-style is also supported:
  # per_class_min_val_instances: {tops: 150, footwear: 80}
  per_class_min_val_instances: {}
  per_class_min_test_instances: {}
  
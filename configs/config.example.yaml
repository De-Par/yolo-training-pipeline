# Run with:
#   python3 tools/train_yolo.py --cfg configs/config.example.yaml
#
# Ultralytics docs:
# - Config / arguments list: https://docs.ultralytics.com/usage/cfg/
# - Train mode:             https://docs.ultralytics.com/modes/train/
#
# Notes:
# - CLI overrides YAML if you pass the same option via CLI.
# - Some keys are task-specific (detect/seg/pose/cls/obb). Leave them null unless needed.

# ============================================================
# REQUIRED 
# ============================================================

# Model checkpoint (.pt) or model definition (.yaml)
model: path/to/yolo.pt

# Dataset config (the prepared data.yaml created by prepare step)
data: path/to/detection_dataset/data.yaml

# ============================================================
# OUTPUT / RUN MANAGEMENT
# ============================================================

project: runs/train          # base output directory
name: my-dataset-yolo-baseline
exist_ok: false              # true -> reuse same run directory name (do not increment)

save: true                   # save checkpoints
save_period: -1              # save every N epochs; -1 disables periodic saving
plots: true                  # save results plots (loss/mAP curves etc.)
verbose: false               # extra logging

# ============================================================
# CORE TRAINING SCHEDULE
# ============================================================

epochs: 80                   # number of epochs
time: null                   # max training time in hours (if set, may override epochs)
patience: 100                # early stopping patience (epochs without improvement)

# image size:
# - int => square imgsz
# - [h, w] sometimes supported (depending on task)
imgsz: 640

# batch:
# - int fixed batch
# - -1 or fractional values may be treated as auto-batch in some setups
batch: 16

# ============================================================
# HARDWARE / PERFORMANCE
# ============================================================

# device:
# - 0 / 1 / ... GPU index
# - "cpu" forces CPU
# - "mps"
device: 0

workers: 4                   # dataloader workers per process

# cache:
# - null/false: off
# - "ram": cache images in RAM (fastest if enough RAM)
# - "disk": cache images on disk
cache: null

amp: true                    # mixed precision (fast on NVIDIA)
compile: false               # torch.compile (PyTorch 2.x) if supported by your ultralytics build

# ============================================================
# REPRODUCIBILITY / RESUME
# ============================================================

seed: 42
deterministic: false         # true => more deterministic, can reduce speed
resume: false                # true => resume last run automatically (if supported)

pretrained: true             # use pretrained weights when appropriate

# ============================================================
# DATASET / SPLITS / FILTERS
# ============================================================

val: true                    # run validation during training
split: val                   # which split to use for validation (val/test) if dataset defines it

fraction: 1.0                # train on subset of training data (0..1)

single_cls: false            # treat as single-class dataset
classes: null                # e.g. [0, 2, 5] to train only selected classes

rect: false                  # rectangular training (keeps aspect ratio, different batching)
multi_scale: false           # random multi-scale resizing during training

# ============================================================
# OPTIMIZER / LR SCHEDULE 
# ============================================================

optimizer: auto              # auto | SGD | Adam | AdamW (depends on version)
lr0: 0.01                    # initial LR
lrf: 0.01                    # final LR fraction: final_lr = lr0 * lrf

momentum: 0.937
weight_decay: 0.0005

cos_lr: false                # cosine LR schedule
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

nbs: 64                      # nominal batch size for LR scaling

# gradient / stability
accumulate: null             # gradient accumulation steps (if supported)
clip_grad: null              # gradient clipping value (if supported)

# ============================================================
# LOSS WEIGHTS (DETECTION-STYLE)
# ============================================================

box: 7.5                     # box loss gain
cls: 0.5                     # class loss gain
dfl: 1.5                      # distribution focal loss gain (modern heads)

label_smoothing: null        # unsupported in ultralytics 8.4.x detect cfg; kept for compatibility notes

# ============================================================
# AUGMENTATIONS (COMMON YOLO SET)
# ============================================================

# HSV color augmentation
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4

# Geometric
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0

# Flips
flipud: 0.0
fliplr: 0.5

# Color channel swap
bgr: 0.0                     # probability to swap channels (if supported)

# Mix augmentations
mosaic: 1.0
mixup: 0.0
copy_paste: 0.0

# Disable mosaic during last N epochs for stability
close_mosaic: 10

# Other (version-dependent)
erasing: 0.0
crop_fraction: null          # unsupported in ultralytics 8.4.x detect cfg; kept for compatibility notes

# ============================================================
# VALIDATION / NMS-LIKE KNOBS 
# ============================================================

conf: null                    # confidence threshold (if supported in val context)
iou: null                     # IoU threshold for NMS/eval
max_det: null                 # max detections per image

half: null                    # fp16 inference in eval (training AMP is separate)

# ============================================================
# EXPORT / LOGGING INTEGRATIONS 
# ============================================================

# These often depend on local setup; keep null unless you use them

tracker: null                 # tracker config (more for track mode)
profile: false                 # profiler on/off (if supported)
